<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-Sync Privacy Policy</title>
  <script>
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    if (lang.startsWith('ko')) { location.replace('ko/'); }
    else if (lang.startsWith('zh')) { location.replace('zh/'); }
    else if (lang.startsWith('ja')) { location.replace('ja/'); }
    else { location.replace('en/'); }
  </script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px;color:#555;">
  <p>Redirecting&hellip; <a href="en/">Click here if not redirected</a></p>
</body>
</html>
